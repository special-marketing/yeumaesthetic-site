<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>예약 전 확인</title>

  <style>
    :root{
      --bg:#0b0d12;
      --card:#121622;
      --text:#ffffff;
      --muted:rgba(255,255,255,.72);
      --stroke:rgba(255,255,255,.12);
      --btn:#00c73c;
      --btnText:#ffffff;
      --btnDisabled:rgba(255,255,255,.16);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    .wrap{
      min-height: 100dvh;
      padding: 20px 16px 24px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .card{
      width:100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 12px 40px rgba(0,0,0,.35);
    }
    h1{
      font-size: 18px;
      margin: 0 0 8px;
      letter-spacing: -.2px;
    }
    p{
      margin:0 0 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }
    .options{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin: 12px 0 16px;
    }
    .opt{
      border:1px solid var(--stroke);
      border-radius: 14px;
      padding: 12px 12px;
      display:flex;
      gap:10px;
      align-items:flex-start;
      cursor:pointer;
      user-select:none;
      background: rgba(255,255,255,.02);
    }
    .opt input{ margin-top:2px; }
    .opt strong{
      display:block;
      font-size: 14px;
      margin-bottom: 2px;
    }
    .opt span{
      display:block;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
    }
    .divider{
      height:1px;
      background: var(--stroke);
      margin: 14px 0;
    }
    .cta{
      width:100%;
      border:none;
      border-radius: 14px;
      padding: 14px 14px;
      font-size: 15px;
      font-weight: 800;
      cursor:pointer;
      background: var(--btn);
      color: var(--btnText);
    }
    .cta:disabled{
      background: var(--btnDisabled);
      color: rgba(255,255,255,.55);
      cursor:not-allowed;
      font-weight: 700;
    }
    .small{
      margin-top:10px;
      font-size:11px;
      color: rgba(255,255,255,.55);
      line-height:1.45;
    }
  </style>

<body>
  <div class="wrap">
    <div class="card">
      <h1>나이대가 어떻게 되시나요? (맞춤관리를 위해)</h1>
      <p>선택하신 내용에 맞춰 예약 페이지로 바로 이동합니다.</p>

      <form id="qForm" class="options">
        <label class="opt">
          <input type="radio" name="area" value="20대" />
          <div>
            <strong>20대</strong>
            <span></span>
          </div>
        </label>

        <label class="opt">
          <input type="radio" name="area" value="30대" />
          <div>
            <strong>30대</strong>
            <span></span>
          </div>
        </label>

        <label class="opt">
          <input type="radio" name="area" value="40대" />
          <div>
            <strong>40대</strong>
            <span></span>
          </div>
        </label>
		
		<label class="opt">
          <input type="radio" name="area" value="50대" />
          <div>
            <strong>50대</strong>
            <span></span>
          </div>
        </label>

		<label class="opt">
          <input type="radio" name="area" value="60대" />
          <div>
            <strong>60대</strong>
            <span></span>
          </div>
        </label>

      </form>

      <div class="divider"></div>

      <button id="goNaver" class="cta" disabled>특별이벤트 예약하러 가기 (3/6)</button>
      <div class="small">
        * 선택값은 예약 최적화 이벤트에만 사용됩니다.
      </div>
    </div>
  </div>

<script type="module">
  import { db } from "../firebase-init.js";
  import { doc, setDoc, updateDoc, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

  const NEXT_URL = "./backlanding1-4.html";
  const STEP_NUM = 3;
  const ANSWER_KEY = "q3_age";
  const PIXEL_EVENT = "3st_BookClick";   // 당신이 원하면 기존 이벤트명 유지해도 됨
  
  
  
  //const PIXEL_EVENT = "PreQual_BookClick";    // 머신러닝을 위한 임시 이벤트할당



  const PASS_QUERY_TO_NEXT = false;

  const form = document.getElementById("qForm");
  const btn  = document.getElementById("goNaver");

  function getAnswer(){
    const checked = form.querySelector('input[name="area"]:checked');
    return checked ? checked.value : null;
  }

function getOrCreateSid(){
  // ✅ 권장: 30분 지나면 새 sid
  const TTL_MS = 30 * 60 * 1000; // 테스트용으로는 10*1000 같이 줄여도 됨
  const now = Date.now();

  const p = new URLSearchParams(location.search);
  const sidParam = p.get("sid");

  const savedSid = localStorage.getItem("bookSid");
  const savedAt = Number(localStorage.getItem("bookSidAt") || 0);

  const fresh = !!(savedSid && savedAt && (now - savedAt) < TTL_MS);

  // 1) 같은 흐름(페이지 이동 중)으로 넘어온 sid면 그대로 유지 + 시간 연장
  if (sidParam && sidParam === savedSid && fresh) {
    localStorage.setItem("bookSidAt", String(now));
    return savedSid;
  }

  // 2) 저장된 sid가 아직 신선하면(30분 이내) 유지 + 시간 연장(슬라이딩)
  if (fresh && savedSid) {
    localStorage.setItem("bookSidAt", String(now));
    return savedSid;
  }

  // 3) 만료됐으면 새로 발급
  const sid = (crypto.randomUUID ? crypto.randomUUID() : String(now) + Math.random().toString(16).slice(2));
  localStorage.setItem("bookSid", sid);
  localStorage.setItem("bookSidAt", String(now));
  return sid;
}


  function buildNextUrl(url, sid){
    const u = new URL(url, location.href);
    u.searchParams.set("sid", sid);
    if (PASS_QUERY_TO_NEXT && location.search) {
      const cur = new URLSearchParams(location.search);
      for (const [k,v] of cur.entries()) {
        if (k === "sid") continue;
        if (!u.searchParams.has(k)) u.searchParams.set(k, v);
      }
    }
    return u.toString();
  }

  async function upsertAnswer(sid, key, value){
	const COL = location.hostname.replace(/[^a-zA-Z0-9_-]/g, "_"); // 예: naver_com
	const ref = doc(db, COL, sid);
    const updatePayload = {
      sid,
      step: STEP_NUM,
      updatedAt: serverTimestamp(),
      [`answers.${key}`]: value,
    };
    try { await updateDoc(ref, updatePayload); }
    catch (e) {
      await setDoc(ref, {
        sid,
        startedAt: serverTimestamp(),
        step: STEP_NUM,
        updatedAt: serverTimestamp(),
        answers: { [key]: value },
      }, { merge: true });
    }
  }

  form.addEventListener("change", () => {
    btn.disabled = !getAnswer();
  });

  btn.addEventListener("click", async (e) => {
    e.preventDefault();
    const answer = getAnswer();
    if (!answer) return;

    const sid = getOrCreateSid();

    if (typeof fbq === "function") {
      fbq("trackCustom", PIXEL_EVENT, { area: answer, step: String(STEP_NUM), sid });
    }

    try { await upsertAnswer(sid, ANSWER_KEY, answer); }
    catch (err) { console.error("Firestore save failed:", err); }

    window.location.href = buildNextUrl(NEXT_URL, sid);
  });
</script>


</body>
</html>
