<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>예약 전 확인</title>

  <style>
    :root{
      --bg:#0b0d12;
      --card:#121622;
      --text:#ffffff;
      --muted:rgba(255,255,255,.72);
      --stroke:rgba(255,255,255,.12);
      --btn:#00c73c;
      --btnText:#ffffff;
      --btnDisabled:rgba(255,255,255,.16);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    .wrap{
      min-height: 100dvh;
      padding: 20px 16px 24px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .card{
      width:100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 12px 40px rgba(0,0,0,.35);
    }
    h1{
      font-size: 18px;
      margin: 0 0 8px;
      letter-spacing: -.2px;
    }
    p{
      margin:0 0 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }
    .options{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin: 12px 0 16px;
    }
    .opt{
      border:1px solid var(--stroke);
      border-radius: 14px;
      padding: 12px 12px;
      display:flex;
      gap:10px;
      align-items:flex-start;
      user-select:none;
      background: rgba(255,255,255,.02);
    }
    .opt strong{
      display:block;
      font-size: 14px;
      margin-bottom: 2px;
    }
    .opt span{
      display:block;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
    }
    .divider{
      height:1px;
      background: var(--stroke);
      margin: 14px 0;
    }
    .cta{
      width:100%;
      border:none;
      border-radius: 14px;
      padding: 14px 14px;
      font-size: 15px;
      font-weight: 800;
      cursor:pointer;
      background: var(--btn);
      color: var(--btnText);
    }
    .cta:disabled{
      background: var(--btnDisabled);
      color: rgba(255,255,255,.55);
      cursor:not-allowed;
      font-weight: 700;
    }
    .small{
      margin-top:10px;
      font-size:11px;
      color: rgba(255,255,255,.55);
      line-height:1.45;
    }
    .text-input{
      margin-top:10px;
      width:100%;
      padding:12px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color:#fff;
      font-size:14px;
      outline:none;
    }
  </style>

	<!-- Meta Pixel Code -->
	<script>
	!function(f,b,e,v,n,t,s)
	{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
	n.callMethod.apply(n,arguments):n.queue.push(arguments)};
	if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
	n.queue=[];t=b.createElement(e);t.async=!0;
	t.src=v;s=b.getElementsByTagName(e)[0];
	s.parentNode.insertBefore(t,s)}(window, document,'script',
	'https://connect.facebook.net/en_US/fbevents.js');
	fbq('init', '4597211400510007');
	fbq('track', 'PageView');
	</script>
	<noscript><img height="1" width="1" style="display:none"
	src="https://www.facebook.com/tr?id=4597211400510007&ev=PageView&noscript=1"
	/></noscript>

</head>

<body>
  <div class="wrap">
    <div class="card">
      <h1>등에서 어디가 제일 고민이신가요?</h1>
      <p>간단히 적어주시면 예약 페이지로 바로 이동합니다.</p>

      <form id="qForm" class="options">
        <label class="opt" style="cursor:default;">
          <div style="width:100%;">
            <strong>고민 내용를 입력해주세요</strong>
            <span>예: 등살, 승모근, 옆구리 등</span>
            <input
              id="painText"
              class="text-input"
              type="text"
              name="pain"
              placeholder="여기에 입력"
              autocomplete="off"
            />
          </div>
        </label>
      </form>

      <div class="divider"></div>

      <button id="goNaver" class="cta" disabled>특별이벤트 예약하러 가기 (4/6)</button>
      <div class="small">
        * 입력값은 예약 최적화 이벤트에만 사용됩니다.
      </div>
    </div>
  </div>

<script type="module">
  import { db } from "../firebase-init.js";
  import { doc, setDoc, updateDoc, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

  const NEXT_URL = "./backlanding1-5.html";
  const STEP_NUM = 4;
  const ANSWER_KEY = "q4_faceConcern"; // Firestore answers에 저장될 키
  const PIXEL_EVENT = "4st_BookClick"; // 기존 이벤트명 유지(원하면 바꾸세요)

  const btn = document.getElementById("goNaver");
  const input = document.getElementById("painText");

function getOrCreateSid(){
  // ✅ 권장: 30분 지나면 새 sid
  const TTL_MS = 30 * 60 * 1000; // 테스트용으로는 10*1000 같이 줄여도 됨
  const now = Date.now();

  const p = new URLSearchParams(location.search);
  const sidParam = p.get("sid");

  const savedSid = localStorage.getItem("bookSid");
  const savedAt = Number(localStorage.getItem("bookSidAt") || 0);

  const fresh = !!(savedSid && savedAt && (now - savedAt) < TTL_MS);

  // 1) 같은 흐름(페이지 이동 중)으로 넘어온 sid면 그대로 유지 + 시간 연장
  if (sidParam && sidParam === savedSid && fresh) {
    localStorage.setItem("bookSidAt", String(now));
    return savedSid;
  }

  // 2) 저장된 sid가 아직 신선하면(30분 이내) 유지 + 시간 연장(슬라이딩)
  if (fresh && savedSid) {
    localStorage.setItem("bookSidAt", String(now));
    return savedSid;
  }

  // 3) 만료됐으면 새로 발급
  const sid = (crypto.randomUUID ? crypto.randomUUID() : String(now) + Math.random().toString(16).slice(2));
  localStorage.setItem("bookSid", sid);
  localStorage.setItem("bookSidAt", String(now));
  return sid;
}


  function buildNextUrl(url, sid){
    const u = new URL(url, location.href);
    // 기존 쿼리스트링 유지(utm, fbclid 등) + sid 강제 유지
    const cur = new URLSearchParams(location.search);
    for (const [k,v] of cur.entries()) {
      if (k === "sid") continue;
      if (!u.searchParams.has(k)) u.searchParams.set(k, v);
    }
    u.searchParams.set("sid", sid);
    return u.toString();
  }

  function getInputValue(){
    const v = input.value.trim();
    return v.length ? v.slice(0, 120) : null; // 길이 제한(문서 비대화 방지)
  }

  async function upsertAnswer(sid, key, value){
	const COL = location.hostname.replace(/[^a-zA-Z0-9_-]/g, "_"); // 예: naver_com
	const ref = doc(db, COL, sid);

    try {
      // 문서가 있으면 업데이트(startedAt 보존)
      await updateDoc(ref, {
        sid,
        step: STEP_NUM,
        updatedAt: serverTimestamp(),
        [`answers.${key}`]: value,
        lastPage: "backlanding1-4"
      });
    } catch (e) {
      // 문서가 없으면 생성
      await setDoc(ref, {
        sid,
        startedAt: serverTimestamp(),
        step: STEP_NUM,
        updatedAt: serverTimestamp(),
        answers: { [key]: value },
        lastPage: "backlanding1-4"
      }, { merge: true });
    }
  }

  // 입력 시 버튼 활성화
  input.addEventListener("input", () => {
    btn.disabled = !getInputValue();
  });

  // 엔터로도 진행
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      if (!btn.disabled) btn.click();
    }
  });

  btn.addEventListener("click", async (e) => {
    e.preventDefault();

    const answer = getInputValue();
    if (!answer) return;

    const sid = getOrCreateSid();

    // Meta Pixel
    if (typeof fbq === "function") {
      fbq("trackCustom", PIXEL_EVENT, {
        area: answer,
        step: String(STEP_NUM),
        sid
      });
    }

    // Firestore 저장(실패해도 이동은 진행)
    try {
      await upsertAnswer(sid, ANSWER_KEY, answer);
    } catch (err) {
      console.error("Firestore save failed:", err);
    }

    window.location.href = buildNextUrl(NEXT_URL, sid);
  });

  // 초기 상태
  btn.disabled = !getInputValue();
</script>

  
</body>
</html>
