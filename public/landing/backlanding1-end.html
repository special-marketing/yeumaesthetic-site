<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>예약 전 확인</title>

  <style>
    :root{
      --bg:#0b0d12;
      --card:#121622;
      --text:#ffffff;
      --muted:rgba(255,255,255,.72);
      --stroke:rgba(255,255,255,.12);
      --btn:#00c73c;
      --btnText:#ffffff;
      --btnDisabled:rgba(255,255,255,.16);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    .wrap{
      min-height: 100dvh;
      padding: 20px 16px 24px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .card{
      width:100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 12px 40px rgba(0,0,0,.35);
    }
    h1{
      font-size: 18px;
      margin: 0 0 8px;
      letter-spacing: -.2px;
    }
    h2{
      font-size: 16px;
      margin: 0 0 8px;
      letter-spacing: -.2px;
    }
    p{
      margin:0 0 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .options{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin: 12px 0 16px;
    }

    .opt{
      border:1px solid var(--stroke);
      border-radius: 14px;
      padding: 12px 12px;
      display:flex;
      gap:10px;
      align-items:flex-start;
      cursor:pointer;
      user-select:none;
      background: rgba(255,255,255,.02);
      width:100%;
    }
    .opt input{
      margin-top:2px;
      flex:0 0 auto;
    }
    .opt strong{
      display:block;
      font-size: 14px;
      margin-bottom: 0;
      line-height: 1.35;
    }

    .divider{
      height:1px;
      background: var(--stroke);
      margin: 14px 0;
    }

    .consent-wrap{
      margin-bottom: 14px;
    }

    .cta{
      width:100%;
      border:none;
      border-radius: 14px;
      padding: 14px 14px;
      font-size: 15px;
      font-weight: 800;
      cursor:pointer;
      background: var(--btn);
      color: var(--btnText);
    }
    .cta:disabled{
      background: var(--btnDisabled);
      color: rgba(255,255,255,.55);
      cursor:not-allowed;
      font-weight: 700;
    }
    .small{
      margin-top:10px;
      font-size:11px;
      color: rgba(255,255,255,.55);
      line-height:1.45;
    }
  </style>

</head>

<body>
  <div class="wrap">
    <div class="card">
      <h1>예약금 1만원 (예약 시 결제)</h1>
      <h2>당일취소·노쇼 환불 불가</h2>
      <p>선택하신 내용에 맞춰 예약 페이지로 바로 이동합니다.</p>

      <form id="qForm" class="options">
        <label class="opt">
          <input type="checkbox" id="agreeDepositRule" />
          <div>
            <strong>위 내용 확인 후 예약 진행합니다.</strong>
          </div>
        </label>
      </form>

      <div class="divider"></div>

      <div class="consent-wrap">
        <label class="opt">
          <input type="checkbox" id="agreePrivacy" />
          <div>
            <strong>위 개인정보 수집·이용에 동의합니다.</strong>
          </div>
        </label>
      </div>

      <button id="goNaver" class="cta" disabled>특별이벤트 예약하러 가기 (6/6)</button>

      <div class="small">
        * 선택값은 예약 최적화 이벤트에만 사용됩니다.
      </div>
    </div>
  </div>

<script type="module">
  import { db } from "../firebase-init.js";
  import { doc, setDoc, updateDoc, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

  const NEXT_URL = "./backlanding1-complete.html";
  const STEP_NUM = 6;
  const ANSWER_KEY = "q6_depositRule";
  // const PIXEL_EVENT = "PreQual_BookClick";
  const PIXEL_EVENT = "PreQual_BookClick1";  // 지금 현재 예약을 맞춤픽셀로 잡고 있음

  const DEPOSIT_RULE_VERSION = "deposit-rule-v1";
  const PRIVACY_NOTICE_VERSION = "privacy-notice-v1";
  const PRIVACY_CONSENT_VERSION = "privacy-consent-v1";

  const form = document.getElementById("qForm");
  const btn  = document.getElementById("goNaver");
  const agreeDepositRule = document.getElementById("agreeDepositRule");
  const agreePrivacy = document.getElementById("agreePrivacy");

  function getOrCreateSid(){
    const TTL_MS = 30 * 60 * 1000;
    const now = Date.now();

    const p = new URLSearchParams(location.search);
    const sidParam = p.get("sid");

    const savedSid = localStorage.getItem("bookSid");
    const savedAt  = Number(localStorage.getItem("bookSidAt") || 0);

    const fresh = !!(savedSid && savedAt && (now - savedAt) < TTL_MS);

    if (sidParam && sidParam === savedSid && fresh) {
      localStorage.setItem("bookSidAt", String(now));
      return savedSid;
    }
    if (fresh && savedSid) {
      localStorage.setItem("bookSidAt", String(now));
      return savedSid;
    }

    const sid = (crypto.randomUUID
      ? crypto.randomUUID()
      : String(now) + Math.random().toString(16).slice(2));

    localStorage.setItem("bookSid", sid);
    localStorage.setItem("bookSidAt", String(now));
    return sid;
  }

  function isReady(){
    return agreeDepositRule.checked && agreePrivacy.checked;
  }

  function syncButton(){
    btn.disabled = !isReady();
  }

  function buildNextUrl(url, sid){
    const u = new URL(url, location.href);

    const cur = new URLSearchParams(location.search);
    for (const [k,v] of cur.entries()) {
      if (k === "sid") continue;
      if (!u.searchParams.has(k)) u.searchParams.set(k, v);
    }

    u.searchParams.set("sid", sid);
    return u.toString();
  }

  async function upsertFinalStep(sid){
    const COL = location.hostname.replace(/[^a-zA-Z0-9_-]/g, "_");
    const ref = doc(db, COL, sid);

    const updatePayload = {
      sid,
      step: STEP_NUM,
      updatedAt: serverTimestamp(),
      completedStep6At: serverTimestamp(),
      [`answers.${ANSWER_KEY}`]: "예약금규정확인",
      [`consents.depositRule.agreed`]: true,
      [`consents.depositRule.version`]: DEPOSIT_RULE_VERSION,
      [`consents.depositRule.agreedAt`]: serverTimestamp(),
      [`consents.privacy.agreed`]: true,
      [`consents.privacy.version`]: PRIVACY_CONSENT_VERSION,
      [`consents.privacy.noticeVersion`]: PRIVACY_NOTICE_VERSION,
      [`consents.privacy.agreedAt`]: serverTimestamp(),
      [`consents.privacy.fields`]: [
        "region",
        "visitTime",
        "ageBand",
        "concern",
        "phone"
      ],
      lastPage: "backlanding1-6"
    };

    try {
      await updateDoc(ref, updatePayload);
    } catch (e) {
      await setDoc(ref, {
        sid,
        startedAt: serverTimestamp(),
        ...updatePayload
      }, { merge: true });
    }
  }

  agreeDepositRule.addEventListener("change", syncButton);
  agreePrivacy.addEventListener("change", syncButton);
  form.addEventListener("change", syncButton);

  btn.addEventListener("click", async (e) => {
    e.preventDefault();
    if (!isReady()) return;

    const sid = getOrCreateSid();

    if (typeof fbq === "function") {
      fbq("trackCustom", PIXEL_EVENT, {
        step: String(STEP_NUM),
        sid,
        deposit_rule_agreed: true,
        privacy_agreed: true
      });
    }

    try {
      await upsertFinalStep(sid);
    } catch (err) {
      console.error("Firestore save failed:", err);
    }

    window.location.href = buildNextUrl(NEXT_URL, sid);
  });

  syncButton();
</script>
</body>
</html>
