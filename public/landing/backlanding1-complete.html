<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>예약 완료</title>

  <style>
    :root{
      --bg:#0b0d12;
      --card:#121622;
      --text:#ffffff;
      --muted:rgba(255,255,255,.72);
      --stroke:rgba(255,255,255,.12);
      --ok:#00c73c;
      --link:rgba(255,255,255,.62);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    .wrap{
      min-height: 100dvh;
      padding: 20px 16px 24px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .card{
      width:100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 12px 40px rgba(0,0,0,.35);
      text-align:center;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border:1px solid rgba(0,199,60,.45);
      border-radius:999px;
      background: rgba(0,199,60,.14);
      color: rgba(255,255,255,.95);
      font-size:12px;
      margin-bottom:10px;
    }
    .check{
      width:18px;height:18px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background: rgba(0,199,60,.18);
      border:1px solid rgba(0,199,60,.55);
      font-weight:900;
      line-height:1;
    }
    h1{
      font-size: 18px;
      margin: 0 0 8px;
      letter-spacing: -.2px;
    }
    p{
      margin:0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }
    .small{
      margin-top:12px;
      font-size:11px;
      color: rgba(255,255,255,.55);
      line-height:1.45;
    }
    .policy{
      margin-top: 14px;
      font-size: 11px;
      line-height: 1.45;
      color: rgba(255,255,255,.58);
    }
    .policy a{
      color: var(--link);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
  </style>

  <!-- Meta Pixel Code -->
  <script>
  !function(f,b,e,v,n,t,s)

  n.queue=[];t=b.createElement(e);t.async=!0;

  'https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', '1222858113356894');

</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="badge"><span class="check">✓</span>예약 접수 완료</div>
      <h1>예약이 완료되었습니다.</h1>
      <p>
        확인 후 최대한 빨리 안내드리겠습니다.<br/>
        이 창은 닫으셔도 됩니다.
      </p>

      <div class="small">
        * 예약 확정은 입금 확인 후 진행됩니다.
      </div>

      <div class="policy">
        개인정보 수집·이용에 동의해 주셔서 감사합니다.<br/>
        <a href="https://electric-drawer-00d.notion.site/307d9584df6c8065b728d74c3131d499" target="_blank" rel="noopener noreferrer">개인정보처리방침 보기</a>
      </div>
    </div>
  </div>

  <script>
    const COMPLETE_EVENT = "BookComplete";

    const p = new URLSearchParams(location.search);
    const sid = p.get("sid") || localStorage.getItem("bookSid") || "";

    if (typeof fbq === "function") {
      fbq("trackCustom", COMPLETE_EVENT, {
        sid: sid,
        page: "backlanding1-end",
        step: "complete"
      });
    }
  </script>
</body>
</html>
