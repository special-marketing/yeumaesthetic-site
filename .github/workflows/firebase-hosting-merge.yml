name: Deploy to Firebase Hosting (live) on merge

on:
  push:
    branches:
      - main

permissions:
  contents: read
  checks: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORA_ESTHETHIC }}"
          projectId: "sp-esthetic-main"
          channelId: "live"
          target: "yeumaesthetic"
